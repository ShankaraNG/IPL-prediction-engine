model:
  name: grid_cv_ipl_rf_model
  save_path: models/

best_model:
  name: ipl_rf_model
  save_path: models/

training:
  cv: 5
  scoring: f1_weighted

parameter_grid:
  n_estimators: [200, 400, 600]
  max_depth: [10, 20, 30, null]
  min_samples_split: [2, 5, 10]
  min_samples_leaf: [1, 2, 4]
  max_features: ['sqrt', 'log2']
  bootstrap: [true, false]
  class_weight: 'balanced'